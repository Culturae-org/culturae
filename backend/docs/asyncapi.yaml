  license:
    name: Proprietary

id: 'urn:culturae:realtime'
defaultContentType: application/json

servers:
  production:
    host: demo.culturae.me
    pathname: /api/v1/realtime
    protocol: wss
    description: Production WebSocket server
    security:
      - bearerAuth: []
      - websocketProtocolAuth: []
  development:
    host: localhost:8080
    pathname: /api/v1/realtime
    protocol: ws
    description: Local development WebSocket server
    security:
      - bearerAuth: []
      - websocketProtocolAuth: []

channels:
  realtime:
    address: /api/v1/realtime
    description: Main WebSocket channel — one channel for all real-time features.
    servers:
      - $ref: '#/servers/production'
      - $ref: '#/servers/development'
    messages:
      # Utility — Server → Client
      hello:
        $ref: '#/components/messages/HelloMessage'
      ack:
        $ref: '#/components/messages/AckMessage'
      pong:
        $ref: '#/components/messages/PongMessage'
      error:
        $ref: '#/components/messages/ErrorMessage'
      # Game lifecycle — Server → Client
      game_created:
        $ref: '#/components/messages/GameCreatedMessage'
      game_ready:
        $ref: '#/components/messages/GameReadyMessage'
      game_starting:
        $ref: '#/components/messages/GameStartingMessage'
      game_started:
        $ref: '#/components/messages/GameStartedMessage'
      game_completed:
        $ref: '#/components/messages/GameCompletedMessage'
      game_cancelled:
        $ref: '#/components/messages/GameCancelledMessage'
      game_paused:
        $ref: '#/components/messages/GamePausedMessage'
      game_resumed:
        $ref: '#/components/messages/GameResumedMessage'
      question_timeout:
        $ref: '#/components/messages/QuestionTimeoutMessage'
      # Players — Server → Client
      player_joined:
        $ref: '#/components/messages/PlayerJoinedMessage'
      player_left:
        $ref: '#/components/messages/PlayerLeftMessage'
      player_disconnected:
        $ref: '#/components/messages/PlayerDisconnectedMessage'
      player_reconnected:
        $ref: '#/components/messages/PlayerReconnectedMessage'
      player_ready_update:
        $ref: '#/components/messages/PlayerReadyUpdateMessage'
      # Questions & answers — Server → Client
      question_sent:
        $ref: '#/components/messages/QuestionSentMessage'
      answer_received:
        $ref: '#/components/messages/AnswerReceivedMessage'
      score_updated:
        $ref: '#/components/messages/ScoreUpdatedMessage'
      # Country-listing mode — Server → Client
      country_found:
        $ref: '#/components/messages/CountryFoundMessage'
      country_not_found:
        $ref: '#/components/messages/CountryNotFoundMessage'
      country_already_found:
        $ref: '#/components/messages/CountryAlreadyFoundMessage'
      # Social — Server → Client
      pending_invites:
        $ref: '#/components/messages/PendingInvitesMessage'
      game_invite:
        $ref: '#/components/messages/GameInviteMessage'
      game_invite_accepted:
        $ref: '#/components/messages/GameInviteAcceptedMessage'
      game_invite_rejected:
        $ref: '#/components/messages/GameInviteRejectedMessage'
      game_invite_updated:
        $ref: '#/components/messages/GameInviteUpdatedMessage'
      # Lobby — Server → Client
      lobby_stats:
        $ref: '#/components/messages/LobbyStatsMessage'
      lobby_updated:
        $ref: '#/components/messages/LobbyUpdatedMessage'
      # Social / friends — Server → Client
      friend_request_rejected:
        $ref: '#/components/messages/FriendRequestRejectedMessage'
      friend_request_cancelled:
        $ref: '#/components/messages/FriendRequestCancelledMessage'
      friend_removed:
        $ref: '#/components/messages/FriendRemovedMessage'
      # Presence & admin — Server → Client
      presence:
        $ref: '#/components/messages/PresenceMessage'
      admin_notification:
        $ref: '#/components/messages/AdminNotificationMessage'
      # Matchmaking — Server → Client
      queue_joined:
        $ref: '#/components/messages/QueueJoinedMessage'
      queue_left:
        $ref: '#/components/messages/QueueLeftMessage'
      match_found:
        $ref: '#/components/messages/MatchFoundMessage'
      # Player progression — Server → Client
      xp_updated:
        $ref: '#/components/messages/XPUpdatedMessage'
      elo_updated:
        $ref: '#/components/messages/ELOUpdatedMessage'
      # Reconnection — Server → Client
      game_state:
        $ref: '#/components/messages/GameStateMessage'
      # Miscellaneous — Server → Client
      game_results:
        $ref: '#/components/messages/GameResultsMessage'
      game_invite_cancelled:
        $ref: '#/components/messages/GameInviteCancelledMessage'
      notification:
        $ref: '#/components/messages/NotificationMessage'
      # Client → Server
      ping:
        $ref: '#/components/messages/PingMessage'
      join_game:
        $ref: '#/components/messages/JoinGameMessage'
      leave_game:
        $ref: '#/components/messages/LeaveGameMessage'
      player_ready_client:
        $ref: '#/components/messages/PlayerReadyMessage'
      start_game:
        $ref: '#/components/messages/StartGameMessage'
      submit_answer:
        $ref: '#/components/messages/SubmitAnswerMessage'

