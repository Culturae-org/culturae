    get:
      operationId: getLeaderboard
      summary: Get leaderboard
      description: 'Returns player rankings. Supports multiple leaderboard types and game mode filters.

        Results are cached for 5 minutes. If authenticated, includes the current user''s rank.


        **Leaderboard types:**

        - `global` — All-time rankings by total score

        - `weekly` — Rankings by score earned in the last 7 days

        - `monthly` — Rankings by score earned in the last 30 days

        - `elo` — Rankings by ELO rating (1v1 competitive)

        '
      tags:
      - Leaderboard
      security:
      - BearerAuth: []
      parameters:
      - in: query
        name: type
        schema:
          type: string
          enum:
          - global
          - weekly
          - monthly
          - elo
          default: global
        description: Leaderboard type
      - in: query
        name: mode
        schema:
          type: string
          enum:
          - all
          - solo
          - 1v1
          default: all
        description: Game mode filter (applies to weekly/monthly types)
      - in: query
        name: limit
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
        description: Number of entries to return
      - in: query
        name: offset
        schema:
          type: integer
          default: 0
          minimum: 0
        description: Offset for pagination
      responses:
        '200':
          description: Leaderboard data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardResponse'
              example:
                data:
                  entries:
                  - rank: 1
                    user_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    username: top_player
                    public_id: '#20483-18393'
                    has_avatar: true
                    score: 25000
                    elo_rating: 1450
                  - rank: 2
                    user_id: b2c3d4e5-f6a7-8901-bcde-f12345678901
                    username: challenger
                    public_id: '#12345-67890'
                    has_avatar: false
                    score: 22000
                    elo_rating: 1380
                  user_rank:
                    rank: 42
                    user_id: c3d4e5f6-a7b8-9012-cdef-123456789012
                    username: current_user
                    public_id: '#11111-22222'
                    has_avatar: true
                    score: 8500
                    elo_rating: 1100
                  type: global
                  mode: all
                  total_users: 2
        '400':
          description: Invalid leaderboard type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: 'Invalid leaderboard type. Use: global, weekly, monthly, elo'
