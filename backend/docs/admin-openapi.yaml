  /api/v1/admin/avatar/{userID}:
    post:
      operationId: adminUploadAvatar
      summary: Upload avatar for a user
      description: 'Uploads or replaces the avatar image for the specified user.

        Respects the same file type and size limits as the user-facing upload

        (governed by avatar config — see `GET /api/v1/admin/settings/avatar`).

        '
      tags:
      - Admin Avatar
      security:
      - BearerAuth: []
      parameters:
      - in: path
        name: userID
        required: true
        schema:
          type: string
          format: uuid
        description: The UUID of the target user
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - avatar
              properties:
                avatar:
                  type: string
                  format: binary
                  description: Image file (jpg/jpeg/png)
          application/json:
            example: null
      responses:
        '200':
          description: Avatar uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Avatar uploaded successfully
                  data:
                    type: object
                    properties:
                      has_avatar:
                        type: boolean
                        example: true
        '400':
          description: No file, invalid type, or file too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                no_file:
                  summary: No file provided
                  value:
                    error:
                      code: VALIDATION_ERROR
                      message: No file uploaded
                invalid_type:
                  summary: Invalid file type
                  value:
                    error:
                      code: VALIDATION_ERROR
                      message: Invalid file type. Only .jpg, .jpeg, .png are allowed.
                file_too_large:
                  summary: File exceeds size limit
                  value:
                    error:
                      code: VALIDATION_ERROR
                      message: File size exceeds the configured limit.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: adminDeleteAvatar
      summary: Delete avatar for a user
      tags:
      - Admin Avatar
      security:
      - BearerAuth: []
      parameters:
      - in: path
        name: userID
        required: true
        schema:
          type: string
          format: uuid
        description: The UUID of the target user
      responses:
        '200':
          description: Avatar deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Avatar deleted successfully
                  data:
                    type: object
                    properties:
                      has_avatar:
                        type: boolean
                        example: false
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: User has no avatar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: NOT_FOUND
                  message: No avatar to delete
    get:
      operationId: adminGetAvatar
      summary: Get avatar for a user
      description: Returns the raw avatar image bytes for the specified user.
      tags:
      - Admin Avatar
      security:
      - BearerAuth: []
      parameters:
      - in: path
        name: userID
        required: true
        schema:
          type: string
          format: uuid
        description: The UUID of the target user
      responses:
        '200':
          description: Avatar image (raw binary)
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: User not found or user has no avatar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                user_not_found:
                  summary: User not found
                  value:
                    error:
                      code: NOT_FOUND
                      message: User not found
                no_avatar:
                  summary: User has no avatar
                  value:
                    error:
                      code: NOT_FOUND
                      message: User has no avatar
