#---------------------------
# Docker Compose - Culturae
#---------------------------
services:
  traefik:
    image: traefik:v3.6.13
    container_name: traefik_proxy
    restart: always
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - culturae-network

  db:
    image: postgres:18-alpine
    restart: always
    container_name: postgres_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB_NAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB_NAME}"]
      interval: 10s
      retries: 5
      timeout: 5s
    networks:
      - culturae-network

  redis:
    image: redis:8.6-alpine
    restart: always
    container_name: redis_db
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'if [ -z "${REDIS_PASSWORD}" ]; then redis-cli ping; else redis-cli -a "$REDIS_PASSWORD" ping; fi',
        ]
      interval: 10s
      retries: 5
      timeout: 3s
    networks:
      - culturae-network

  minio:
    image: quay.io/minio/minio:latest
    restart: always
    container_name: minio_db
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      culturae-network:
        aliases:
          - minio
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      retries: 3
      timeout: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    # image: ghcr.io/culturae-org/culturae:latest | not for now
    image: culturae-backend:latest
    container_name: backend_app
    restart: always
    environment:
      ENV: ${ENV:-production}
      GIN_MODE: release
      PORT: "8080"
      ALLOWED_ORIGINS: "*"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB_NAME: ${POSTGRES_DB_NAME}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-100}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-1m}
      READ_TIMEOUT: ${READ_TIMEOUT:-15s}
      WRITE_TIMEOUT: ${WRITE_TIMEOUT:-15s}
      IDLE_TIMEOUT: ${IDLE_TIMEOUT:-60s}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      REDIS_HOST: redis_db
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB:-0}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openapi.rule=Path(`/api/v1/admin/openapi.yaml`)"
      - "traefik.http.routers.openapi.entrypoints=web"
      - "traefik.http.routers.openapi.priority=25"
      - "traefik.http.routers.openapi.service=backend"
      - "traefik.http.routers.console.rule=PathPrefix(`/console`)"
      - "traefik.http.routers.console.entrypoints=web"
      - "traefik.http.routers.console.priority=20"
      - "traefik.http.routers.console.service=backend"
      - "traefik.http.routers.backend-realtime.rule=PathPrefix(`/api/v1/realtime`)"
      - "traefik.http.routers.backend-realtime.entrypoints=web"
      - "traefik.http.routers.backend-realtime.priority=15"
      - "traefik.http.routers.backend.rule=PathPrefix(`/api/v1`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.routers.backend.priority=10"
      - "traefik.http.routers.root.rule=Path(`/`) || Path(`/login`)"
      - "traefik.http.routers.root.entrypoints=web"
      - "traefik.http.routers.root.priority=1"
      - "traefik.http.routers.root.service=backend"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"
    networks:
      - culturae-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  culturae-network:
    driver: bridge
